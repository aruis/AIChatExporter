<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="popup.css">
  <script src="ai_providers.js"></script>
  <script src="providers/chatgpt.js"></script>

<body>
